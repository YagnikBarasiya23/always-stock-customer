name: always_stock
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.12.2
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  dio: ^5.10.0
  flutter_bloc: ^9.1.1
  equatable: ^2.1.0
  internet_connection_checker_plus: ^3.1.1
  toastification: ^3.2.0
  shared_preferences: ^2.5.5
  go_router: ^17.3.0
  cached_network_image: ^3.4.1
  easy_localization: ^3.0.8
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700